<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fale Conosco</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">Copa Store 2026</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Catálogo</a></li>
                        <li class="nav-item"><a class="nav-link" href="cadastro.html">Cadastro</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu1.html">História</a></li>
                        <li class="nav-item"><a class="nav-link active" href="menu2.html">Fale Conosco</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu3.html">Dicas</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container conteudo-principal">
        <section class="card p-4">
            <h1>Fale com a gente</h1>

            <p>
                Entre em contato com a Copa Store 2026 para tirar dúvidas,
                enviar sugestões ou pedir informações sobre produtos.
            </p>

            <form>
                <div class="mb-3">
                    <label class="form-label">Nome</label>
                    <input type="text" class="form-control" placeholder="Digite seu nome">
                </div>

                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" class="form-control" placeholder="Digite seu e-mail">
                </div>

                <div class="mb-3">
                    <label class="form-label">Mensagem</label>
                    <textarea class="form-control" rows="5" placeholder="Digite sua mensagem"></textarea>
                </div>

                <button type="button" class="btn btn-primary" onclick="alert('Mensagem enviada como simulação!')">
                    Enviar mensagem
                </button>
            </form>
        </section>
    </main>

    <footer class="rodape">
        <p>&copy; 2026 Copa Store 2026 - Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

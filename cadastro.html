<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="index.html">Copa Store 2026</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="index.html">Catálogo</a></li>
                        <li class="nav-item"><a class="nav-link active" href="cadastro.html">Cadastro</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu1.html">História</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu2.html">Fale Conosco</a></li>
                        <li class="nav-item"><a class="nav-link" href="menu3.html">Dicas</a></li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container conteudo-principal">

        <section class="card p-4">
            <h1 class="h3 mb-3">Cadastro de Produto</h1>

            <p>
                Esta página representa a área de cadastro dos produtos do catálogo.
                Aqui é possível simular o preenchimento das informações principais.
            </p>

            <form>
                <div class="mb-3">
                    <label class="form-label">Nome do produto</label>
                    <input type="text" class="form-control" placeholder="Ex: Camisa Brasil 2026">
                </div>

                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    <textarea class="form-control" rows="3" placeholder="Digite a descrição do produto"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Categoria</label>
                    <select class="form-select">
                        <option>Camisas</option>
                        <option>Acessórios</option>
                        <option>Bonés</option>
                        <option>Chuteiras</option>
                        <option>Outros</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Preço</label>
                        <input type="number" class="form-control" placeholder="149.90">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Tamanho</label>
                        <input type="text" class="form-control" placeholder="P, M, G, GG">
                    </div>

                    <div class="col-md-4 mb-3">
                        <label class="form-label">Cor</label>
                        <input type="text" class="form-control" placeholder="Amarela">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantidade disponível</label>
                    <input type="number" class="form-control" placeholder="20">
                </div>

                <button type="button" class="btn btn-success" onclick="alert('Produto cadastrado como simulação!')">
                    Cadastrar Produto
                </button>
            </form>
        </section>

    </main>

    <footer class="rodape">
        <p>&copy; 2026 Copa Store 2026 - Todos os direitos reservados.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
